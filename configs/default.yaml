app:
  name: SeatmapSVGTool
input:
  file: samples/歌剧院座位图—加座版.xlsx
  sheet: 净版
  range: A1:AX103
output:
  svg: output/seatmap.svg
  report: output/report.json
  preview_png: output/preview.png
seat:
  regex: "^\\d+(?:\\+\\d+)?$"
  width: 28
  height: 20
  gap_x: 4
  gap_y: 4
  radius: 4
  font_size: 9
layout:
  origin_x: 40
  origin_y: 40
  cell_width: 32
  cell_height: 24
style:
  normal_fill: "#f04b5f"
  added_fill: "#f28c28"
  disabled_fill: "#4b4b4b"
  label_fill: "#d9d9d9"
  stage_fill: "#6fa8dc"
  stroke: "#333333"
  text_fill: "#111111"
rules:
  added_seat:
    by_text_regex: "^\\d+\\+\\d+$"
  disabled_seat:
    by_fill_keys:
      - "theme:0"
  normal_seat:
    by_default: true
ignore:
  ranges:
    - BB1:BF103
