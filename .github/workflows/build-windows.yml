name: Build Windows EXE

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest
      - name: Build executable
        run: pyinstaller --windowed --onefile --name SeatmapSVGTool --add-data "configs;configs" seatmap_svg_gui.py
      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release
          New-Item -ItemType Directory -Force release\package\configs,release\package\output | Out-Null
          Copy-Item dist\SeatmapSVGTool.exe release\package\SeatmapSVGTool.exe -Force
          Copy-Item configs\default.yaml release\package\configs\default.yaml -Force
          Copy-Item README.md release\package\README.md -Force
          New-Item -ItemType File -Force release\package\output\.gitkeep | Out-Null
          Compress-Archive -Path release\package\* -DestinationPath release\SeatmapSVGTool-windows-x64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: SeatmapSVGTool-windows-x64
          path: release/SeatmapSVGTool-windows-x64.zip
