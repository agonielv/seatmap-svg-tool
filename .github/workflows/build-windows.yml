name: Build Windows EXE

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest
      - name: Build executable
        run: pyinstaller --onefile --name SeatmapSVGTool seatmap_svg.py
      - name: Package zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release
          Compress-Archive -Path dist\SeatmapSVGTool.exe,configs,samples,README.md -DestinationPath release\SeatmapSVGTool-windows-x64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: SeatmapSVGTool-windows-x64
          path: release/SeatmapSVGTool-windows-x64.zip
